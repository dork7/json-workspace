<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSON workspace</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="sidebar-head">
          <h1 class="sidebar-title">JSON</h1>
          <button type="button" id="btn-new-tab" class="btn primary">+ New tab</button>
        </div>

        <div class="watch-panel">
          <h2 class="watch-heading">Watch</h2>
          <p class="watch-hint">
            Paths from root, e.g. <code>user</code>, <code>items[0]</code>,
            <code>["key-name"]</code>
          </p>
          <div class="watch-add">
            <input
              type="text"
              id="watch-input"
              class="watch-input"
              list="watch-datalist"
              placeholder="path…"
              autocomplete="off"
              spellcheck="false"
            />
            <button type="button" id="btn-watch-add" class="btn">Add</button>
          </div>
          <datalist id="watch-datalist"></datalist>
          <ul id="watch-list" class="watch-list"></ul>
        </div>

        <ul id="tab-list" class="tab-list" role="tablist" aria-label="Open JSON tabs"></ul>

        <div class="compare-panel">
          <h2 class="compare-heading">Compare two tabs</h2>
          <label class="field"
            >Tab A
            <select id="compare-a"></select>
          </label>
          <label class="field"
            >Tab B
            <select id="compare-b"></select>
          </label>
          <button type="button" id="btn-compare" class="btn">Show diff side by side</button>
        </div>
      </aside>

      <div class="main">
        <header class="toolbar" id="main-toolbar">
          <div class="toolbar-actions">
            <button type="button" id="btn-format" class="btn primary">Format</button>
            <button type="button" id="btn-minify" class="btn">Minify</button>
            <span class="toolbar-sep" aria-hidden="true"></span>
            <span class="toolbar-label">View</span>
            <label class="toggle"
              ><input type="radio" name="edit-view" value="text" checked /> Text</label
            >
            <label class="toggle"
              ><input type="radio" name="edit-view" value="tree" /> Tree</label
            >
            <span class="toolbar-sep tree-only hidden" aria-hidden="true"></span>
            <button type="button" id="btn-collapse-all" class="btn tree-only hidden">
              Collapse all
            </button>
            <button type="button" id="btn-expand-all" class="btn tree-only hidden">
              Expand all
            </button>
          </div>
          <div class="toolbar-search" id="toolbar-search">
            <label class="search-field">
              Find
              <input type="search" id="search-in-tab" placeholder="Search in tab…" autocomplete="off" />
            </label>
            <button type="button" id="btn-find-prev" class="btn ghost">Prev</button>
            <button type="button" id="btn-find-next" class="btn ghost">Next</button>
            <span id="find-status" class="muted"></span>
          </div>
        </header>

        <section id="editor-section" class="editor-section" aria-label="JSON editor">
          <div class="editor-pane text-pane">
            <textarea
              id="json-textarea"
              class="json-textarea"
              spellcheck="false"
              placeholder="Paste JSON here. Switch to Tree for a collapsible view. Tabs on the left switch documents."
            ></textarea>
          </div>
          <div class="editor-pane tree-pane hidden" id="tree-pane">
            <div id="json-tree" class="json-tree" tabindex="0" aria-label="Collapsible JSON"></div>
          </div>
        </section>

        <section id="compare-section" class="compare-section hidden" aria-label="Compare view">
          <div class="compare-toolbar">
            <button type="button" id="btn-close-compare" class="btn primary">Back to editor</button>
            <span class="compare-hint muted">Only differing lines are shown (paired by line number).</span>
          </div>
          <div class="compare-split">
            <div class="compare-side">
              <h3 id="compare-title-a" class="compare-side-title"></h3>
              <div id="compare-lines-a" class="compare-lines"></div>
            </div>
            <div class="compare-side">
              <h3 id="compare-title-b" class="compare-side-title"></h3>
              <div id="compare-lines-b" class="compare-lines"></div>
            </div>
          </div>
        </section>
      </div>
    </div>
    <script type="module" src="/js/main.js"></script>
  </body>
</html>
